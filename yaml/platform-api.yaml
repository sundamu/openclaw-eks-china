apiVersion: v1
kind: ServiceAccount
metadata:
  name: platform-api
  namespace: openclaw-platform
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-api
  namespace: openclaw-platform
  labels:
    app.kubernetes.io/name: platform-api
    app.kubernetes.io/component: api
spec:
  replicas: ${PLATFORM_REPLICAS}
  selector:
    matchLabels:
      app.kubernetes.io/name: platform-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: platform-api
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: platform-api
      terminationGracePeriodSeconds: 30
      containers:
        - name: platform-api
          image: ${PLATFORM_IMAGE}
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          envFrom:
            - secretRef:
                name: platform-db-secret
            - secretRef:
                name: platform-config
            - secretRef:
                name: platform-admin-seed
          env:
            - name: K8S_IN_CLUSTER
              value: "true"
            - name: LOG_LEVEL
              value: "INFO"
            - name: AVAILABLE_CHANNELS
              value: "feishu"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
---
apiVersion: v1
kind: Service
metadata:
  name: platform-api
  namespace: openclaw-platform
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: external
    service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: ip
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
    service.beta.kubernetes.io/aws-load-balancer-security-groups: "${NLB_SG_ID}"
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: platform-api
  ports:
    - name: http
      protocol: TCP
      port: 8890
      targetPort: 8000
