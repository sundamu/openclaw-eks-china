apiVersion: v1
kind: Namespace
metadata:
  name: openclaw-operator-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: openclaw-operator
  namespace: openclaw-operator-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: openclaw-operator-manager-role
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: openclaw-operator-manager-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: openclaw-operator-manager-role
subjects:
  - kind: ServiceAccount
    name: openclaw-operator
    namespace: openclaw-operator-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw-operator
  namespace: openclaw-operator-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: openclaw-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openclaw-operator
    spec:
      serviceAccountName: openclaw-operator
      containers:
        - name: manager
          image: public.ecr.aws/i4x4j7g8/openclaw-saas/openclaw-operator:v0.20.0
          args: ["--leader-elect"]
          ports:
            - containerPort: 8443
              name: metrics
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
